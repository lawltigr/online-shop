{% extends "base.html" %}
{% block title %}
{% if category %}{{category.name}} {% else %}Catalog{% endif %}
{% endblock %}
{% block content %}
<h1>
    {% if category %}Category: {{category.name}}{% else %}Product Catalog{% endif %}
</h1>
<form method="get" style="margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap;">
    <input type="text" name="q" placeholder="Search..." value="{{ request.GET.q }}">
    <input type="number" step="0.01" name="min_price" placeholder="Minimal price" value="{{ request.GET.min_price }}">
    <input type="number" step="0.01" name="max_price" placeholder="Maximum price" value="{{ request.GET.max_price }}">

    <label>
        <input type="checkbox" name="in_stock" value="1" {% if request.GET.in_stock == '1' %}checked{% endif %}>
        Only in stock
    </label>
    <select name="sort">
        <option value="">Sort</option>
        <option value="price_asc" {% if request.GET.sort == 'price_asc' %}selected{% endif %}>Price ↑</option>
        <option value="price_desc" {% if request.GET.sort == 'price_desc' %}selected{% endif %}>Price ↓</option>
        <option value="name_asc" {% if request.GET.sort == 'name_asc' %}selected{% endif %}>Name A-Z</option>
        <option value="name_desc" {% if request.GET.sort == 'name_desc' %}selected{% endif %}>Name Z-A</option>
    </select>
    <button type="submit">Apply</button>
    <!-- Category -->
</form>
